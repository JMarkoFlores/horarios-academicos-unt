name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache backend node_modules
        id: cache-backend
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-node-modules-${{ hashFiles('backend/package-lock.json') }}

      - name: Install backend dependencies
        if: steps.cache-backend.outputs.cache-hit != 'true'
        working-directory: backend
        run: npm ci

      - name: Backend lint
        working-directory: backend
        run: npm run lint

      - name: Cache frontend node_modules
        id: cache-frontend
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-node-modules-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        shell: bash
        run: |
          if npm run | grep -qE '^[[:space:]]+lint'; then
            npm run lint
          elif node -e "const fs=require('fs'); const angular=JSON.parse(fs.readFileSync('angular.json','utf8')); const hasLint=Boolean(angular.projects?.frontend?.architect?.lint); process.exit(hasLint ? 0 : 1)"; then
            npx ng lint
          else
            echo "::notice::El frontend no tiene script ni target de lint configurado; se omite ng lint en CI."
          fi

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Cache backend node_modules
        id: cache-backend
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-node-modules-${{ hashFiles('backend/package-lock.json') }}

      - name: Install backend dependencies
        if: steps.cache-backend.outputs.cache-hit != 'true'
        working-directory: backend
        run: npm ci

      - name: Backend test
        working-directory: backend
        shell: bash
        run: |
          if npm run | grep -qE '^[[:space:]]+test'; then
            npm run test
          else
            echo "::notice::El backend no tiene script test configurado; se omite npm run test en CI."
          fi

      - name: Cache frontend node_modules
        id: cache-frontend
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-node-modules-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci

      - name: Frontend test
        working-directory: frontend
        env:
          CHROME_BIN: /usr/bin/google-chrome
        shell: bash
        run: |
          if node -e "const fs=require('fs'); const angular=JSON.parse(fs.readFileSync('angular.json','utf8')); const hasTest=Boolean(angular.projects?.frontend?.architect?.test); process.exit(hasTest ? 0 : 1)"; then
            npx ng test --watch=false --browsers=ChromeHeadless
          else
            echo "::notice::El frontend no tiene target de test configurado; se omite ng test en CI."
          fi

  build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache backend node_modules
        id: cache-backend
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-node-modules-${{ hashFiles('backend/package-lock.json') }}

      - name: Install backend dependencies
        if: steps.cache-backend.outputs.cache-hit != 'true'
        working-directory: backend
        run: npm ci

      - name: Backend build
        working-directory: backend
        run: npm run build

      - name: Cache frontend node_modules
        id: cache-frontend
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-node-modules-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npx ng build --configuration=production
