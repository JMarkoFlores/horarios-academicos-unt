name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: unt_user
          POSTGRES_PASSWORD: unt_pass123
          POSTGRES_DB: horarios_unt
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-node-modules-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-node-modules-
          
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
        
      - name: Lint
        working-directory: ./backend
        run: npm run lint
        
      - name: Build
        working-directory: ./backend
        run: npm run build
        
      - name: Unit & Integration Tests
        working-directory: ./backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: unt_user
          DATABASE_PASSWORD: unt_pass123
          DATABASE_NAME: horarios_unt
          JWT_SECRET: secret_key_for_testing
        run: npm run test:cov
        
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-node-modules-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-node-modules-
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Build
        working-directory: ./frontend
        run: npm run build
        
      - name: Unit Tests
        working-directory: ./frontend
        run: npm run test:headless -- --no-watch --no-progress --code-coverage
        
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  e2e-tests:
    name: E2E Tests (Playwright)
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: unt_user
          POSTGRES_PASSWORD: unt_pass123
          POSTGRES_DB: horarios_unt
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Backend Deps
        working-directory: ./backend
        run: npm ci
        
      - name: Install Frontend Deps
        working-directory: ./frontend
        run: npm ci
        
      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps
        
      - name: Run Backend
        working-directory: ./backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: unt_user
          DATABASE_PASSWORD: unt_pass123
          DATABASE_NAME: horarios_unt
          JWT_SECRET: secret_key_for_testing
        run: npm run start &
        
      - name: Wait for Backend
        run: npx wait-on http://localhost:3000/api/docs
        
      - name: Run E2E Tests
        working-directory: ./frontend
        run: npx playwright test
        
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
