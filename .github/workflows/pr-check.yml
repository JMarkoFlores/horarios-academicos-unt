name: PR Check

on:
  pull_request:
    branches:
      - develop

jobs:
  branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ ! "$BRANCH_NAME" =~ ^(feature|hotfix)\/.+$ ]]; then
            echo "::error::El nombre de la rama debe seguir el patrón feature/* o hotfix/*"
            exit 1
          fi

  build-check:
    runs-on: ubuntu-latest
    needs: branch-name
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache backend node_modules
        id: cache-backend
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-node-modules-${{ hashFiles('backend/package-lock.json') }}

      - name: Install backend dependencies
        if: steps.cache-backend.outputs.cache-hit != 'true'
        working-directory: backend
        run: npm ci

      - name: Backend build
        working-directory: backend
        run: npm run build

      - name: Cache frontend node_modules
        id: cache-frontend
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-node-modules-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npx ng build --configuration=production

  notify-build-failure:
    runs-on: ubuntu-latest
    needs: build-check
    if: failure()
    steps:
      - name: Comment on PR build failure
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'El workflow `pr-check` fallo durante la verificacion de build. Revisa los logs de GitHub Actions para corregir el problema antes de fusionar el PR.',
            });
