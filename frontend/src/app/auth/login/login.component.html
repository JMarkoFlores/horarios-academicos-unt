<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header class="login-header">
      <div class="logo-block">
        <mat-icon class="logo-icon">school</mat-icon>
        <div>
          <h1 class="logo-title">Horarios UNT</h1>
          <p class="logo-sub">Sistema de Gestión Académica &mdash; EIS</p>
        </div>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('required')">El correo es obligatorio</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Formato de correo inválido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password" />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">La contraseña es obligatoria</mat-error>
        </mat-form-field>

        <div class="error-msg" *ngIf="error">
          <mat-icon>error_outline</mat-icon> {{ error }}
        </div>

        <button mat-raised-button color="primary" type="submit"
                class="full-width submit-btn"
                [disabled]="loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Ingresar</span>
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
