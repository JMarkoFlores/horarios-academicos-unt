<h2 mat-dialog-title>
  <mat-icon style="vertical-align:middle;margin-right:8px;color:var(--color-primary)">lock_reset</mat-icon>
  Cambiar Contraseña
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Contraseña actual</mat-label>
      <input matInput formControlName="password_actual" [type]="hideActual ? 'password' : 'text'" />
      <button mat-icon-button matSuffix type="button" (click)="hideActual = !hideActual">
        <mat-icon>{{ hideActual ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error *ngIf="form.get('password_actual')?.hasError('required')">La contraseña actual es obligatoria</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nueva contraseña</mat-label>
      <input matInput formControlName="password_nueva" [type]="hideNueva ? 'password' : 'text'" />
      <button mat-icon-button matSuffix type="button" (click)="hideNueva = !hideNueva">
        <mat-icon>{{ hideNueva ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-hint>Mínimo 8 caracteres</mat-hint>
      <mat-error *ngIf="form.get('password_nueva')?.hasError('required')">La nueva contraseña es obligatoria</mat-error>
      <mat-error *ngIf="form.get('password_nueva')?.hasError('minlength')">Mínimo 8 caracteres</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirmar nueva contraseña</mat-label>
      <input matInput formControlName="confirmar_password" [type]="hideConfirmar ? 'password' : 'text'" />
      <button mat-icon-button matSuffix type="button" (click)="hideConfirmar = !hideConfirmar">
        <mat-icon>{{ hideConfirmar ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error *ngIf="form.get('confirmar_password')?.hasError('required')">Confirma la contraseña</mat-error>
    </mat-form-field>

    <mat-error *ngIf="form.hasError('noCoinciden') && form.get('confirmar_password')?.dirty" class="match-error">
      Las contraseñas no coinciden
    </mat-error>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()" [disabled]="loading">Cancelar</button>
  <button mat-flat-button color="primary" (click)="guardar()" [disabled]="form.invalid || loading">
    <mat-spinner *ngIf="loading" diameter="18" style="display:inline-block;margin-right:8px"></mat-spinner>
    Cambiar contraseña
  </button>
</mat-dialog-actions>
