<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="!isMobile"
    class="sidenav"
  >
    <div class="logo-area">
      <mat-icon class="logo-icon">school</mat-icon>
      <div>
        <div class="logo-title">Horarios UNT</div>
        <div class="logo-sub">EIS &mdash; Sistema Académico</div>
      </div>
    </div>

    <mat-divider></mat-divider>

    <mat-nav-list>
      <a
        mat-list-item
        *ngFor="let link of navLinks"
        [routerLink]="link.route"
        routerLinkActive="active-link"
      >
        <mat-icon matListItemIcon>{{ link.icon }}</mat-icon>
        <span matListItemTitle>{{ link.label }}</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-footer">
      <mat-divider></mat-divider>
      <div class="user-row">
        <div class="user-avatar">
          {{ (usuario?.nombre || "A")[0] }}
        </div>
        <div class="user-info">
          <span class="user-name">{{
            usuario?.nombre || "Administrador"
          }}</span>
          <span class="user-role">{{ usuario?.rol }}</span>
        </div>
      </div>
      <button mat-button class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon> Cerrar sesión
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      <button
        mat-icon-button
        *ngIf="isMobile"
        (click)="toggleSidenav()"
        class="hamburger"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <span class="section-title">{{ sectionTitle }}</span>
      <span class="spacer"></span>

      <div class="topbar-actions">
        <button mat-icon-button (click)="toggleDarkMode()" class="theme-toggle">
          <mat-icon>{{ isDark ? "light_mode" : "dark_mode" }}</mat-icon>
        </button>

        <mat-form-field appearance="outline" class="periodo-field">
          <mat-select [(value)]="periodoService.periodo">
            <mat-option *ngFor="let p of periodoService.periodos" [value]="p">{{
              p
            }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </mat-toolbar>

    <div class="content-area animate-fadein">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
