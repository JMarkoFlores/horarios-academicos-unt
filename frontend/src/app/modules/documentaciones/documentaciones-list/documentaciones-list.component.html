<div class="page-shell">
  <div class="page-header">
    <div>
      <h1>Documentaciones</h1>
      <p>Declaraciones enviadas por docentes para revision del director de escuela.</p>
    </div>
  </div>

  <mat-card class="table-card">
    <div *ngIf="loading" class="loading-state">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="items" class="full-table" *ngIf="!loading">
      <ng-container matColumnDef="docente">
        <th mat-header-cell *matHeaderCellDef>Docente</th>
        <td mat-cell *matCellDef="let item">{{ item.docente_nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="ibm">
        <th mat-header-cell *matHeaderCellDef>IBM</th>
        <td mat-cell *matCellDef="let item">{{ item.docente_ibm || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="periodo">
        <th mat-header-cell *matHeaderCellDef>Periodo</th>
        <td mat-cell *matCellDef="let item">{{ item.periodo }}</td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let item">{{ getEstadoLabel(item.estado) }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let item">
          <button
            mat-raised-button
            color="primary"
            (click)="verificarDeclaracion(item)"
          >
            Verificar Declaracion
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <div class="empty-state" *ngIf="!loading && items.length === 0">
      No hay documentaciones enviadas para este periodo.
    </div>
  </mat-card>
</div>
