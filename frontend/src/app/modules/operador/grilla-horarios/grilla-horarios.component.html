<div class="grilla-container">
  <div class="grilla-header">
    <h4>Grilla de Disponibilidad</h4>
    <mat-progress-bar mode="indeterminate" *ngIf="loading"></mat-progress-bar>
  </div>

  <div class="leyenda">
    <span class="leyenda-item"><span class="color-libre"></span> Libre</span>
    <span class="leyenda-item"><span class="color-bloqueado"></span> Restricción</span>
    <span class="leyenda-item"><span class="color-confirmado-docente"></span> Tu horario confirmado</span>
    <span class="leyenda-item"><span class="color-confirmado"></span> Ocupado (otro)</span>
    <span class="leyenda-item"><span class="color-temporal-otro"></span> Reservado (otro)</span>
    <span class="leyenda-item"><span class="color-temporal-propio"></span> Mi selección</span>
  </div>

  <div class="tabla-wrapper">
    <table class="grilla-tabla">
      <thead>
        <tr>
          <th class="hora-header">Hora</th>
          <th *ngFor="let d of dias">{{ d.label }}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let hora of horas">
          <td class="hora-cell">{{ hora }}-{{ getHoraFin(hora) }}</td>
          <td
            *ngFor="let d of dias"
            class="grilla-celda"
            [ngClass]="getClaseCelda(getCelda(d.valor, hora))"
            [matTooltip]="getTooltipCelda(getCelda(d.valor, hora))"
            [matTooltipDisabled]="!getCelda(d.valor, hora)"
            (click)="onCeldaClick(d.valor, hora)"
            (contextmenu)="onCeldaRightClick(d.valor, hora, $event)"
            (dblclick)="onCeldaDoubleClick(d.valor, hora)"
          >
            <ng-container *ngIf="getCelda(d.valor, hora) as celda">
              <!-- Contador de bloques para celdas libres o con selecciones temporales -->
              <div *ngIf="celda.estado === 'LIBRE' || celda.estado === 'TEMPORAL_PROPIO' || celda.estado === 'TEMPORAL_PROPIO_MULTIPLE'" class="bloque-counter">
                <span class="counter-number">
                  {{ getBloqueCount(celda) }}
                </span>
                <span class="counter-label">bloques</span>
              </div>
              <!-- Multiple occupations display for confirmed -->
              <div *ngIf="celda.estado === 'CONFIRMADO_MULTIPLE' || celda.estado === 'CONFIRMADO_DOCENTE_MULTIPLE'" class="ocupaciones-multiples">
                <div *ngFor="let ocupacion of (celda.metadata?.ocupaciones || []).slice(0, 3); let i = index" 
                     class="ocupacion-block"
                     [ngClass]="{'ocupacion-propia': ocupacion.docenteId === docenteId}">
                  <span class="ocupacion-indice">{{ i + 1 }}</span>
                </div>
              </div>
              <!-- Single occupation display -->
              <ng-container *ngIf="celda.estado === 'CONFIRMADO' || celda.estado === 'CONFIRMADO_DOCENTE' || celda.estado === 'TEMPORAL_OTRO'">
                <mat-icon *ngIf="celda.estado === 'TEMPORAL_OTRO'" class="celda-icon">lock</mat-icon>
                <mat-icon *ngIf="celda.estado === 'CONFIRMADO'" class="celda-icon">event_busy</mat-icon>
                <mat-icon *ngIf="celda.estado === 'CONFIRMADO_DOCENTE'" class="celda-icon">event</mat-icon>
              </ng-container>
            </ng-container>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
